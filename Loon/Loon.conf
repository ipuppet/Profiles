[Remote Proxy]
# 订阅节点
# 别名 = 订阅URL
✈️机场1 = https://example/server-complete.txt
✈️机场2 = https://example2/server-complete.txt
SubStore = https://sub.store/download/collection/selected

[Remote Filter]
# 筛选订阅节点，筛选后的结果可加入到策略组中，目前支持三种筛选方式
# NodeSelect: 使用在UI上选择的节点。
# NameKeyword: 根据提供的关键词对订阅中所有节点的名称进行筛选，使用筛选后的节点。
# NameRegex: 根据提供的正则表达式对订阅中所有节点的名称进行筛选，使用筛选后的节点。
PayPal-Select = NodeSelect,✈️机场1,✈️机场2,SubStore
Apple-Select = NodeSelect,✈️机场1,✈️机场2,SubStore
Netflix-Select = NameKeyword,✈️机场1,✈️机场2,SubStore, FilterKey = Netflix
🇭🇰香港 = NameRegex,✈️机场1,✈️机场2,SubStore, FilterKey = 香港|HK
🇯🇵日本 = NameRegex,✈️机场1,✈️机场2,SubStore, FilterKey = 日本|JP
🇰🇷韩国 = NameRegex,✈️机场1,✈️机场2,SubStore, FilterKey = 韩国|KR
🇺🇸美国 = NameRegex,✈️机场1,✈️机场2,SubStore, FilterKey = 美国|US
Other = NameRegex,✈️机场1,✈️机场2,SubStore, FilterKey = ^(?!.*(HK|JP|US|KR|香港|日本|韩国|美国)).*$

[Proxy]
# 本地节点

# 内置 DIRECT、REJECT 策略

# 节点名称 = 协议，服务器地址，服务器端口，加密协议，密码，
1 = Shadowsocks,1.2.3.4,443,aes-128-gcm,"”password“"
2 = Shadowsocks,1.2.3.4,443,aes-128-gcm,"”password“"
3 = ShadowsocksR,1.2.3.4,443,aes-256-cfb,"”password“",auth_aes128_md5,{},tls1.2_ticket_auth,{}
4 = ShadowsocksR,1.2.3.4,10076,aes-128-cfb,"”password“",auth_aes128_md5,{},tls1.2_ticket_auth,{}
# vmess
# 节点名称 = 协议，服务器地址，端口，加密方式，UUID，传输方式:(tcp/ws),path：websocket握手header中的path，host：websocket握手header中的path，over-tls:是否tls，tls-name：远端w服务器域名，skip-cert-verify：是否跳过证书校验（默认否）
#5 = vmess, 1.2.3.4, 10086, aes-128-gcm,”uuid“,transport:ws,path:/,host:iCloud.com,over-tls:true,tls-name:youtTlsServerName.com,skip-cert-verify:false

[Proxy Group]
# 节点选项
Proxy = select,香港,🇯🇵日本,🇰🇷韩国,🇺🇸美国,Other

Netflix = select,Netflix-Select,Proxy,DIRECT
GlobalMedia = select,Proxy,DIRECT

PayPal = select,PayPal-Select,Proxy,DIRECT
Telegram = select,Proxy,DIRECT
# 苹果服务
iCloud = select,Apple-Select,DIRECT,Proxy
TestFlight = select,Apple-Select,DIRECT,Proxy
AppStore = select,DIRECT,Apple-Select,Proxy
AppStoreConnect = select,DIRECT,Apple-Select,Proxy
# OneDrive
OneDrive = select,DIRECT,Proxy
# 网络测速
SpeedTest = select,DIRECT,Proxy

[Rule]
GEOIP,CN,DIRECT
FINAL,DIRECT

